# ═══════════════════════════════════════════════════════════════════════
# secret.yaml — Kubernetes Secret
#
# WHY SECRETS?
#   Kubernetes Secrets store sensitive data in a way that:
#     1. Keeps them OUT of the Docker image (no secrets in GHCR)
#     2. Keeps them OUT of ConfigMaps (plaintext in etcd)
#     3. Allows RBAC-restricted access (only authorized pods can read them)
#     4. Supports encryption at rest (with KMS integration)
#
# IMPORTANT LIMITATION:
#   By DEFAULT, Kubernetes Secrets are only base64-encoded — NOT encrypted.
#   Base64 is encoding, not encryption. Anyone with access to etcd can read them.
#
#   For true security:
#     - Enable etcd encryption at rest (AES-256)
#     - Use Sealed Secrets (Bitnami) — encrypted in Git, decrypted by controller
#     - Use External Secrets Operator with AWS Secrets Manager / Vault / Azure KeyVault
#     - Use HashiCorp Vault Agent injector
#
# BEST PRACTICE FOR GITOPS:
#   NEVER commit plaintext secrets to Git (even encrypted secrets need caution).
#   Use External Secrets Operator: pull secrets from AWS Secrets Manager/Vault.
#   This file shows the STRUCTURE — in production, use ESO or Sealed Secrets.
#
# HOW SECRETS ARE INJECTED INTO PODS:
#   Method 1: Environment variables (shown in deployment.yaml → secretKeyRef)
#   Method 2: Mounted as files (more secure — secrets not visible in `env` output)
# ═══════════════════════════════════════════════════════════════════════

apiVersion: v1
kind: Secret

metadata:
  name: {{ include "employee-service.fullname" . }}-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "employee-service.labels" . | nindent 4 }}
  # Annotations can mark this secret for external-secrets-operator management
  annotations:
    # If using External Secrets Operator:
    # kubernetes.io/description: "Managed by External Secrets Operator from AWS Secrets Manager"

# type: Opaque = generic secret (any key-value pairs)
# Other types:
#   kubernetes.io/dockerconfigjson = registry pull secret
#   kubernetes.io/tls = TLS certificate
#   kubernetes.io/service-account-token = service account token
type: Opaque

# stringData: accepts PLAIN TEXT values — Kubernetes base64-encodes them automatically.
# Alternative: 'data:' requires manually base64-encoded values.
# Use 'stringData' to avoid base64 encoding mistakes.
#
# PRODUCTION NOTE: These are PLACEHOLDER values.
# Real production secrets come from:
#   1. External Secrets Operator reading from AWS Secrets Manager
#   2. Helm --set-string at install time: helm install ... --set-string 'secret.dbPassword=...'
#   3. CI/CD injecting via Kubernetes API (kubectl create secret)
#   4. Never from a values.yaml file committed to Git
stringData:
  # database-password: injected from an external secret manager in production.
  # For demo with H2 in-memory DB, the password is empty.
  database-password: ""

  # jwt-secret: used to sign and verify JWT tokens (if JWT auth is added).
  # In production: generate a 256-bit random value:
  #   openssl rand -base64 32
  jwt-secret: "REPLACE_WITH_STRONG_SECRET_FROM_VAULT"

  # api-key: external service API key (e.g., notification service, third-party HR system)
  external-api-key: "REPLACE_WITH_API_KEY_FROM_VAULT"
