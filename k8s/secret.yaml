apiVersion: v1
kind: Secret

metadata:
  name: employee-service-secret
  namespace: employee-prod
  labels:
    app.kubernetes.io/name: employee-service
  annotations:
    # If using External Secrets Operator, this annotation maps to an AWS secret:
    # external-secrets.io/aws-secret-id: "prod/employee-service/db"

type: Opaque

# stringData: Kubernetes base64-encodes these at storage time.
# PRODUCTION WARNING:
#   Do NOT commit real passwords here.
#   These are placeholder values for the structure demonstration.
#   In production, use one of:
#     1. External Secrets Operator → syncs from AWS Secrets Manager / Vault
#     2. Sealed Secrets → encrypted blob safe to commit to git
#     3. CI/CD pipeline creates the secret via kubectl:
#        kubectl create secret generic employee-service-secret \
#          --from-literal=database-password="${DB_PASSWORD}" \
#          --namespace=employee-prod
stringData:
  database-password: "REPLACE_IN_PRODUCTION"
  jwt-secret: "REPLACE_IN_PRODUCTION"
  external-api-key: "REPLACE_IN_PRODUCTION"
