apiVersion: v1
kind: ConfigMap

metadata:
  name: employee-service-config
  namespace: employee-prod
  labels:
    app.kubernetes.io/name: employee-service

# data: plaintext key-value configuration.
# These values are injected as environment variables into the pod
# via the Deployment's env.valueFrom.configMapKeyRef entries.
data:
  database-url: "jdbc:h2:mem:employeedb;DB_CLOSE_DELAY=-1"
  database-username: "sa"

  # Spring Boot reads environment variables using SPRING_* naming convention.
  # SPRING_JPA_SHOW__SQL (double underscore = dot in property name)
  # Or the deployment sets: SPRING_DATASOURCE_URL from this ConfigMap key.
  spring.jpa.show-sql: "false"
  spring.h2.console.enabled: "false"
  management.endpoints.web.exposure.include: "health,info,metrics,prometheus"
  management.endpoint.health.show-details: "always"
  logging.level.root: "INFO"
  logging.level.com.company.employee: "INFO"
